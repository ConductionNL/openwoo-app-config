# Ephemeral Nextcloud + PostgreSQL for the functional config-import test.
# Disposable by design: `docker compose -f docker-compose.test.yml down -v`
# wipes the volume, so every run starts from an empty install. This mirrors a
# clean tenant — exactly what the config must import into without errors.
#
# Driven by scripts/functional-test.sh (do not start by hand for CI use).

services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_test_only
    tmpfs:
      - /var/lib/postgresql/data   # ephemeral: no persistence, fast reset
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nextcloud"]
      interval: 5s
      timeout: 3s
      retries: 20

  nextcloud:
    image: nextcloud:30-apache
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8080:80"
    environment:
      POSTGRES_HOST: db
      POSTGRES_DB: nextcloud
      POSTGRES_USER: nextcloud
      POSTGRES_PASSWORD: nextcloud_test_only
      NEXTCLOUD_ADMIN_USER: admin
      NEXTCLOUD_ADMIN_PASSWORD: admin_test_only
      NEXTCLOUD_TRUSTED_DOMAINS: localhost
