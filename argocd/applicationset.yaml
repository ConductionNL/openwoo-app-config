# EXAMPLE — place in your GitOps repo (nextcloud-platform/argo/applicationsets/).
#
# Deploys this repo (as a kustomize app) per WOO tenant: each generated
# Application renders ../kustomization.yaml at a pinned tag and applies it to the
# tenant's namespace. The provisioner ConfigMap + the PostSync Job land there;
# the Job converges the WOO base config (idempotent, re-runs each sync).
#
# The Argo Application config lives here (the GitOps repo), not in the config
# repo — openwoo-app-config is the *source* (config + scripts + kustomize), this
# ApplicationSet is what makes Argo deploy it.
apiVersion: argoproj.io/v1alpha1
kind: ApplicationSet
metadata:
  name: openwoo-provision
  namespace: argocd
spec:
  goTemplate: true
  generators:
    # Swap for your real generator (the tenant list/cluster generator the
    # platform already uses). List shown for clarity.
    - list:
        elements:
          - tenant: hofvantwente
          - tenant: canary
  template:
    metadata:
      name: 'openwoo-provision-{{.tenant}}'
    spec:
      project: default                      # set to your Argo project
      source:
        repoURL: https://codeberg.org/conduction/openwoo-app-config.git
        targetRevision: <tag>               # PIN a release tag (not a branch)
        path: .                             # the root kustomization
      destination:
        server: https://kubernetes.default.svc
        namespace: 'nc-{{.tenant}}'         # resources have no namespace -> land here
      syncPolicy:
        automated:
          prune: true
          selfHeal: true
        syncOptions:
          - CreateNamespace=false           # the tenant namespace already exists
