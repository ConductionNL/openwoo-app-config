# Codeberg CI (Woodpecker). Mirrors the Makefile targets — keep them in sync.
when:
  - event: [push, pull_request]

steps:
  lint:
    image: python:3.12-slim
    commands:
      - python3 scripts/oac.py lint config/woo.configuration.json

  test:
    image: python:3.12-slim
    commands:
      - pip install --quiet --disable-pip-version-check pytest==8.3.4
      - python3 -m pytest -q tests/

  secret-scan:
    image: zricethezav/gitleaks:v8.21.2
    commands:
      - gitleaks detect --source . --no-banner --verbose
