# Provision the WOO base config (Argo PostSync hook). Plain manifest — kustomize
# (../kustomization.yaml) supplies the openwoo-provisioner ConfigMap and rewrites
# the volume reference to its hashed name; Argo applies it in the Application's
# destination namespace (the tenant's). Runs `provision.py all --skip-credentials`
# on a stock python image: base config is Argo-owned; the per-tenant source
# connection (URL + API-Interface-ID + API key) is set out-of-band (CLI/GUI).
# Idempotent — safe to re-run on every sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: openwoo-provision
  labels:
    app.kubernetes.io/part-of: openwoo
    app.kubernetes.io/component: woo-provisioning
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10            # retry until the app + OpenCatalogi base are ready
  template:
    metadata:
      labels:
        app.kubernetes.io/part-of: openwoo
        app.kubernetes.io/component: woo-provisioning
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: provisioner
          configMap:
            name: openwoo-provisioner   # kustomize rewrites to the hashed name
        - name: tmp
          emptyDir: {}
      containers:
        - name: provision
          image: python:3.12-slim
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["python3", "/provisioner/provision.py"]
          args:
            - all
            - --base=http://nextcloud           # in-cluster service in the tenant ns
            - --user=$(NC_ADMIN_USER)
            - --password-env=NC_ADMIN_PASSWORD
            - --config=/provisioner/woo.configuration.json
            - --skip-credentials                # source connection set out-of-band
            # add --skip-oc-settings --skip-catalog for a tenant without the OpenCatalogi base
          env:
            - name: NC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: nextcloud-username
            - name: NC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: nextcloud-password
          volumeMounts:
            - name: provisioner
              mountPath: /provisioner
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 128Mi}
