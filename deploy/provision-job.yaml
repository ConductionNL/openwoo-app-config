{{- if .Values.woo.enabled }}
---
# Provision the WOO base config after Nextcloud + OpenCatalogi base are up.
# Argo PostSync hook; mounts the openwoo-provisioner ConfigMap into a stock
# python image (no custom image needed). Runs `provision.py all --skip-credentials`:
# the base config is Argo-owned; the per-tenant source connection (URL +
# API-Interface-ID + API key) is set out-of-band by an operator (CLI/GUI).
# Idempotent — safe to run on every sync.
apiVersion: batch/v1
kind: Job
metadata:
  name: openwoo-provision-{{ .Values.tenant.name }}
  namespace: {{ .Values.tenant.namespace | default (printf "nc-%s" .Values.tenant.name) }}
  labels:
    {{- include "tenant-resources.labels" . | nindent 4 }}
    app.kubernetes.io/component: woo-provisioning
  annotations:
    argocd.argoproj.io/hook: PostSync
    argocd.argoproj.io/hook-delete-policy: BeforeHookCreation
spec:
  ttlSecondsAfterFinished: 3600
  backoffLimit: 10            # retry until the app + OpenCatalogi base are ready
  template:
    metadata:
      labels:
        {{- include "tenant-resources.labels" . | nindent 8 }}
        app.kubernetes.io/component: woo-provisioning
    spec:
      restartPolicy: OnFailure
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: provisioner
          configMap:
            name: openwoo-provisioner-{{ .Values.tenant.name }}
        - name: tmp
          emptyDir: {}
      containers:
        - name: provision
          image: {{ .Values.woo.pythonImage | default "python:3.12-slim" }}
          imagePullPolicy: IfNotPresent
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop:
                - ALL
          command: ["python3", "/provisioner/provision.py"]
          args:
            - all
            - --base={{ .Values.woo.base | default "http://nextcloud" }}
            - --user=$(NC_ADMIN_USER)
            - --password-env=NC_ADMIN_PASSWORD
            - --config=/provisioner/woo.configuration.json
            - --skip-credentials
            {{- if not .Values.woo.openCatalogiBase }}
            - --skip-oc-settings
            - --skip-catalog
            {{- end }}
            {{- if .Values.woo.forceImport }}
            - --force-import
            {{- end }}
          env:
            - name: NC_ADMIN_USER
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: nextcloud-username
            - name: NC_ADMIN_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: nextcloud-secrets
                  key: nextcloud-password
          volumeMounts:
            - name: provisioner
              mountPath: /provisioner
              readOnly: true
            - name: tmp
              mountPath: /tmp
          resources:
            requests: {cpu: 50m, memory: 64Mi}
            limits: {cpu: 250m, memory: 128Mi}
{{- end }}
