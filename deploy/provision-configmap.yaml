{{- if .Values.woo.enabled }}
---
# GitOps-native: the provisioner script + the (tagged) WOO config as a ConfigMap,
# rendered straight from the files vendored into this chart from
# openwoo-app-config@<tag>. No custom image / registry / build step — a stock
# python image mounts this and runs it (see provision-job.yaml).
#
# Vendoring: place the two files under the chart at
#   files/openwoo/provision.py
#   files/openwoo/woo.configuration.json
# (e.g. an Argo multi-source / git sync of openwoo-app-config at the pinned tag).
# Together they are ~300 KB, well under the 1 MiB ConfigMap limit.
apiVersion: v1
kind: ConfigMap
metadata:
  name: openwoo-provisioner-{{ .Values.tenant.name }}
  namespace: {{ .Values.tenant.namespace | default (printf "nc-%s" .Values.tenant.name) }}
  labels:
    {{- include "tenant-resources.labels" . | nindent 4 }}
    app.kubernetes.io/component: woo-provisioning
data:
  provision.py: |-
    {{- .Files.Get "files/openwoo/provision.py" | nindent 4 }}
  woo.configuration.json: |-
    {{- .Files.Get "files/openwoo/woo.configuration.json" | nindent 4 }}
{{- end }}
