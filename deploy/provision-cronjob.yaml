{{- if and .Values.woo.enabled .Values.woo.reconcile }}
---
# Optional continuous reconciliation (drift repair) for WOO tenants. Same
# idempotent base-config provisioning on a schedule — a near no-op when nothing
# drifted, self-healing when something did. Mounts the openwoo-provisioner
# ConfigMap into a stock python image. Enable with .Values.woo.reconcile.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openwoo-provision-reconcile-{{ .Values.tenant.name }}
  namespace: {{ .Values.tenant.namespace | default (printf "nc-%s" .Values.tenant.name) }}
  labels:
    {{- include "tenant-resources.labels" . | nindent 4 }}
    app.kubernetes.io/component: woo-provisioning
spec:
  schedule: {{ .Values.woo.reconcileSchedule | default "*/30 * * * *" | quote }}
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: provisioner
              configMap:
                name: openwoo-provisioner-{{ .Values.tenant.name }}
            - name: tmp
              emptyDir: {}
          containers:
            - name: provision
              image: {{ .Values.woo.pythonImage | default "python:3.12-slim" }}
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command: ["python3", "/provisioner/provision.py"]
              args:
                - all
                - --base={{ .Values.woo.base | default "http://nextcloud" }}
                - --user=$(NC_ADMIN_USER)
                - --password-env=NC_ADMIN_PASSWORD
                - --config=/provisioner/woo.configuration.json
                - --skip-credentials
                {{- if not .Values.woo.openCatalogiBase }}
                - --skip-oc-settings
                - --skip-catalog
                {{- end }}
              env:
                - name: NC_ADMIN_USER
                  valueFrom:
                    secretKeyRef: {name: nextcloud-secrets, key: nextcloud-username}
                - name: NC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef: {name: nextcloud-secrets, key: nextcloud-password}
              volumeMounts:
                - name: provisioner
                  mountPath: /provisioner
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests: {cpu: 50m, memory: 64Mi}
                limits: {cpu: 250m, memory: 128Mi}
{{- end }}
