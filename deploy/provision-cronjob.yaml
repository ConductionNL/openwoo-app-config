# Optional continuous reconciliation (drift repair). Plain manifest — enable by
# uncommenting it in ../kustomization.yaml. Same idempotent base-config
# provisioning on a schedule (near no-op when converged). Mounts the
# openwoo-provisioner ConfigMap into a stock python image.
apiVersion: batch/v1
kind: CronJob
metadata:
  name: openwoo-provision-reconcile
  labels:
    app.kubernetes.io/part-of: openwoo
    app.kubernetes.io/component: woo-provisioning
spec:
  schedule: "*/30 * * * *"
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 1
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      backoffLimit: 3
      template:
        spec:
          restartPolicy: OnFailure
          securityContext:
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          volumes:
            - name: provisioner
              configMap:
                name: openwoo-provisioner
            - name: tmp
              emptyDir: {}
          containers:
            - name: provision
              image: python:3.12-slim
              imagePullPolicy: IfNotPresent
              securityContext:
                allowPrivilegeEscalation: false
                readOnlyRootFilesystem: true
                capabilities:
                  drop:
                    - ALL
              command: ["python3", "/provisioner/provision.py"]
              args:
                - all
                - --base=http://nextcloud
                - --user=$(NC_ADMIN_USER)
                - --password-env=NC_ADMIN_PASSWORD
                - --config=/provisioner/woo.configuration.json
                - --skip-credentials
              env:
                - name: NC_ADMIN_USER
                  valueFrom:
                    secretKeyRef: {name: nextcloud-secrets, key: nextcloud-username}
                - name: NC_ADMIN_PASSWORD
                  valueFrom:
                    secretKeyRef: {name: nextcloud-secrets, key: nextcloud-password}
              volumeMounts:
                - name: provisioner
                  mountPath: /provisioner
                  readOnly: true
                - name: tmp
                  mountPath: /tmp
              resources:
                requests: {cpu: 50m, memory: 64Mi}
                limits: {cpu: 250m, memory: 128Mi}
