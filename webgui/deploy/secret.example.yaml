# EXAMPLE / TEMPLATE ONLY — do NOT commit real values, and this file is NOT in
# kustomization.yaml. Create the real Secret out-of-band (SOPS / External Secrets
# / kubectl), matching the KeyCloak repo convention that secrets never live in Git.
#
#   client-secret : the Keycloak "openwoo-provisioner" client secret
#   cookie-secret : 32 random bytes, base64 — openssl rand -base64 32
#
# e.g.:
#   kubectl create secret generic openwoo-provisioner-oauth -n openwoo-platform \
#     --from-literal=client-secret="$(read -rs s; echo "$s")" \
#     --from-literal=cookie-secret="$(openssl rand -base64 32)"
apiVersion: v1
kind: Secret
metadata:
  name: openwoo-provisioner-oauth
  namespace: openwoo-platform
type: Opaque
stringData:
  client-secret: "REPLACE_WITH_KEYCLOAK_CLIENT_SECRET"
  cookie-secret: "REPLACE_WITH_OPENSSL_RAND_BASE64_32"
---
# Forgejo/Codeberg token for the tenant-creation flow (POST /tenant -> opens a PR
# on Nextcloud-base). MVP: a `write:repository`-scoped PAT on the maintainer's
# account (MWest2020); hardening: a dedicated `openwoo-bot`. The webgui reads:
#   FORGEJO_TOKEN    <- this secret's `token` key
#   FORGEJO_API_URL  e.g. https://codeberg.org/api/v1   (set in deployment env)
#   TENANTS_REPO     conduction/Nextcloud-base          (set in deployment env)
#   TENANTS_BASE     main                               (set in deployment env)
# NEVER commit the real token. Create out-of-band, e.g.:
#   kubectl create secret generic openwoo-provisioner-git -n openwoo-platform \
#     --from-literal=token="$(read -rs t; echo "$t")"
apiVersion: v1
kind: Secret
metadata:
  name: openwoo-provisioner-git
  namespace: openwoo-platform
type: Opaque
stringData:
  token: "REPLACE_WITH_FORGEJO_WRITE_REPOSITORY_TOKEN"
---
# Platform-assistent (change add-platform-assistant). Beide keys zijn in de
# deployment `optional: true`: zonder dit secret draait de webgui gewoon en
# geeft /assistant een nette 503.
#   api-key         : ANTHROPIC_API_KEY. Besluit 1.1: org-workspace-key met
#                     budget (definitief via ESO); testfase mag een
#                     persoonlijke sub-token (vastgelegde afwijking 2026-07-10).
#   docs-read-token : leestoken voor private componenten in de handboek-
#                     importlijst (docs_mcp; komt in een 0600 credential-file,
#                     nooit in URL of git-config). Weglaten = alleen publieke
#                     componenten.
# NEVER commit real values. Create out-of-band, e.g.:
#   kubectl create secret generic openwoo-assistant -n openwoo-platform \
#     --from-literal=api-key="$(read -rs k; echo "$k")" \
#     --from-literal=docs-read-token="$(read -rs t; echo "$t")"
apiVersion: v1
kind: Secret
metadata:
  name: openwoo-assistant
  namespace: openwoo-platform
type: Opaque
stringData:
  api-key: "REPLACE_WITH_ANTHROPIC_API_KEY"
  docs-read-token: "REPLACE_WITH_CODEBERG_READ_TOKEN_OR_REMOVE"
