# Secrets-documentatie — BEWUST GEEN geldige manifests.
#
# Dit bestand bevatte eerder drie complete Secret-manifests met placeholder-
# waarden. Eén `kubectl apply -f` op (een kopie van) dat bestand overschreef
# op 2026-07-13 twee wérkende secrets met placeholders en legde de tenant-PR-
# flow en de nieuwe pod plat. Daarom staat hier alles in commentaar: applyen
# van dit bestand faalt nu hard in plaats van stil te vergiftigen.
#
# REGEL: secrets maak/wijzig je per stuk, out-of-band, met de commando's
# hieronder. Nooit alle drie in één bestand invullen en applyen.
#
# ─────────────────────────────────────────────────────────────────────────
# 1. openwoo-provisioner-oauth  (oauth2-proxy ↔ Keycloak)
#
#    client-secret : uit Keycloak — realm `commonground`, client
#                    `openwoo-provisioner`, tabblad Credentials.
#    cookie-secret : verse randomness, MOET decoderen naar 16/24/32 bytes:
#                    openssl rand -base64 32 | tr -- '+/' '-_'
#                    (nieuwe waarde = iedereen logt éénmalig opnieuw in)
#
#    kubectl create secret generic openwoo-provisioner-oauth -n openwoo-platform \
#      --from-literal=client-secret="$(read -rs s; echo "$s")" \
#      --from-literal=cookie-secret="$(openssl rand -base64 32 | tr -- '+/' '-_')"
#
#    Bestaat hij al en wil je één veld wijzigen: kubectl patch met stringData,
#    niet opnieuw create/apply.
#
# ─────────────────────────────────────────────────────────────────────────
# 2. openwoo-provisioner-git  (tenant-PR-flow → GitHub; vóór 2026-07-17 was
#    dit een Forgejo/Codeberg-token — na de migratie VERVANGEN, het oude
#    Codeberg-token werkt niet op GitHub)
#
#    token : GitHub fine-grained PAT, alleen repo ConductionNL/Nextcloud-base,
#            permissions Contents:write + Pull requests:write (MVP:
#            maintainer-account; hardening: dedicated bot of GitHub App).
#
#    kubectl create secret generic openwoo-provisioner-git -n openwoo-platform \
#      --from-literal=token="$(read -rs t; echo "$t")"
#
# ─────────────────────────────────────────────────────────────────────────
# 3. openwoo-assistant  (platform-assistent; optioneel — zonder dit secret
#    draait de webgui gewoon en geeft /assistant een 503)
#
#    Zet PRECIES ÉÉN van de twee auth-keys:
#    api-key         : ANTHROPIC_API_KEY (org-workspace-key met budget,
#                      definitief via ESO — besluit 1.1 van de change)
#    oauth-token     : CLAUDE_CODE_OAUTH_TOKEN, persoonlijke subscription-
#                      token uit `claude setup-token` (testfase-afwijking
#                      2026-07-10; api-key wint als beide gezet zijn)
#    docs-read-token : optioneel — leestoken voor private componenten in de
#                      handboek-importlijst (docs_mcp zet hem in een 0600
#                      credential-file, nooit in URL of git-config)
#
#    kubectl create secret generic openwoo-assistant -n openwoo-platform \
#      --from-literal=oauth-token="$(read -rs t; echo "$t")" \
#      --from-literal=docs-read-token="$(read -rs d; echo "$d")"
#
# ─────────────────────────────────────────────────────────────────────────
# NEVER commit real values; dit bestand blijft documentatie en staat bewust
# niet in kustomization.yaml.
