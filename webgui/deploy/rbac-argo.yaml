# Read-only access for the portal to Argo CD Application status (sync/health),
# so the tenant form can show "PR merged -> Argo rolled it out" before handing off
# to provisioning. Cluster-scoped (ClusterRole/Binding) on purpose: Applications
# live in the argocd namespace, and the kustomization's namespace transformer
# would otherwise rewrite a namespaced Role into openwoo-platform. Least privilege:
# get/list/watch on argoproj.io Applications only — no write, nothing else.
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: openwoo-provisioner-argo-read
  labels:
    app.kubernetes.io/name: openwoo-provisioner
rules:
  - apiGroups: ["argoproj.io"]
    resources: ["applications"]
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: openwoo-provisioner-argo-read
  labels:
    app.kubernetes.io/name: openwoo-provisioner
subjects:
  - kind: ServiceAccount
    name: openwoo-provisioner
    namespace: openwoo-platform
roleRef:
  kind: ClusterRole
  name: openwoo-provisioner-argo-read
  apiGroup: rbac.authorization.k8s.io
