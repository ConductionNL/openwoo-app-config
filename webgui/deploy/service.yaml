apiVersion: v1
kind: Service
metadata:
  name: openwoo-provisioner
  namespace: openwoo-platform
  labels:
    app.kubernetes.io/name: openwoo-provisioner
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: openwoo-provisioner
  ports:
    # Targets the oauth2-proxy listener (4180) — never the app's localhost port.
    - name: http
      port: 80
      targetPort: 4180
