# oauth2-proxy config — authenticates operators for the OpenWoo provisioning web GUI.
#
# Keycloak (realm "commonground") is the OIDC provider; Google is brokered INSIDE
# Keycloak as an identity provider, so this proxy only ever speaks OIDC to
# Keycloak (one integration to audit, not two). The proxy is the SOLE ingress to
# the Flask app (upstream on localhost); server.py fails closed (REQUIRE_AUTH) if
# a request ever arrives without the identity header this proxy sets.
#
# Secrets are NEVER in this file — they are injected from the environment:
#   OAUTH2_PROXY_CLIENT_SECRET   the Keycloak "openwoo-provisioner" client secret
#   OAUTH2_PROXY_COOKIE_SECRET   32-byte random, base64 (openssl rand -base64 32)
# In-cluster these come from a Secret (SOPS / External Secrets), per the KeyCloak
# repo convention that client secrets do not live in Git.

provider        = "keycloak-oidc"
oidc_issuer_url = "https://iam.commonground.nu/realms/commonground"
client_id       = "openwoo-provisioner"
redirect_url    = "https://platform.commonground.nu/oauth2/callback"

# Reverse-proxy mode: terminate auth here, forward to the Flask app on localhost.
# reverse_proxy=true so X-Forwarded-Proto from the Ingress is honoured.
http_address  = "0.0.0.0:4180"
upstreams     = ["http://127.0.0.1:8081/"]
reverse_proxy = true

# Forward the authenticated identity to the upstream as X-Forwarded-Email /
# X-Forwarded-User — exactly what server.py current_user() reads. No tokens are
# forwarded (the app needs only the identity, not the access token).
pass_user_headers         = true
pass_access_token         = false
pass_authorization_header = false

# The app needs only the identity header, not the tokens. Storing the id/access/
# refresh tokens in the cookie pushed it past the 4kb limit (split cookies →
# oversized Cookie header → 502). Keep the session minimal: identity only.
session_cookie_minimal    = true

# Restrict who may log in. Tighten/extend to your operator domain(s).
email_domains = ["conduction.nl"]

# Session-cookie hardening. SameSite=lax closes the cross-site POST CSRF noted in
# the Phase-1 security review: the session cookie is not sent on a cross-site form
# POST, so a forged /provision submit is rejected at the proxy.
cookie_secure    = true
cookie_samesite  = "lax"
cookie_expire    = "8h"
skip_provider_button = true
