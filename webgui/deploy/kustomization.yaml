apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: openwoo-platform

resources:
  - namespace.yaml
  - serviceaccount.yaml
  - deployment.yaml
  - service.yaml
  - ingress.yaml
  - networkpolicy.yaml
  # networkpolicy-egress.yaml UITGESCHAKELD 2026-07-13: brak DNS op prod
  # (tweede bevestigde keer onder Gardener/Calico, ondanks correcte
  # kube-system-regel — bevindingen in de kop van die file). Heractiveren
  # alleen na het debug-pod-experiment dat daar beschreven staat.
  - rbac-argo.yaml   # cluster-scoped read-only on Argo Applications (status poll)
  # secret.example.yaml is a TEMPLATE — create the real Secret out-of-band.

# The oauth2-proxy config becomes a hashed ConfigMap, so editing it rolls the pod.
# kustomize rewrites the deployment's volume reference to the hashed name.
configMapGenerator:
  - name: oauth2-proxy-cfg
    files:
      - oauth2-proxy.cfg

# Override the tag/registry per environment, e.g.:
#   kustomize edit set image docker.io/conduction2022/openwoo-provisioner=<registry>/openwoo-provisioner:<tag>
images:
  - name: docker.io/conduction2022/openwoo-provisioner
    # 0.2.0: tenant-creation flow (gitlib + /tenant route + FORGEJO_* env).
    # 0.2.1: landing page (/) with use-case cards + logout; provision form moved to /provision-config.
    # 0.2.2: tenant form minimised to org+env (rest derived); live preview + PR-status polling.
    # 0.2.3: post-merge Argo Synced/Healthy check before the Provision hand-off (needs rbac-argo + SA token).
    # 0.2.4: landing dashboard (tenants + recent PRs) + real logout (RP-initiated to Keycloak).
    # 0.2.5: batch create (one PR, many tenants) + delete tenant (PR removing the file).
    # 0.2.6: Dutch UI + PO-jargon (no script/Argo names); dashboard shows open requests above environments.
    # 0.2.7: in-cluster provisioning mode (cluster-local Service + --host-header) — DNS-flap-proof.
    # 0.3.0: platform-assistent (/assistant): claude-agent-sdk + hub-contentlaag
    #        gepind in het image (HUB_SHA in Dockerfile), git in het image,
    #        assistent-env + cache/home-volumes. LET OP: image éérst
    #        bouwen en pushen (make image/push), dan pas de tag hier bumpen.
    # 0.3.1 (nog te bouwen): ASSISTANT_MAX_QUESTION_CHARS env-tunable.
    newTag: "0.3.0"
