apiVersion: apps/v1
kind: Deployment
metadata:
  name: openwoo-provisioner
  namespace: openwoo-platform
  labels:
    app.kubernetes.io/name: openwoo-provisioner
    app.kubernetes.io/part-of: nextcloud-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: openwoo-provisioner
  template:
    metadata:
      labels:
        app.kubernetes.io/name: openwoo-provisioner
    spec:
      serviceAccountName: openwoo-provisioner
      # Token mounted so the app can READ Argo Application status (sync/health)
      # via the in-cluster API. The SA's only RBAC is read-only on Applications
      # (rbac-argo.yaml) — least privilege.
      automountServiceAccountToken: true
      securityContext:
        runAsNonRoot: true
        seccompProfile:
          type: RuntimeDefault
      containers:
        # The Flask app: gunicorn bound to 127.0.0.1:8081. NOT exposed on the pod
        # network — only the oauth2-proxy sidecar (same netns) can reach it. This
        # localhost bind is what makes X-Forwarded-Email trustworthy.
        - name: app
          image: docker.io/conduction2022/openwoo-provisioner:0.1.4  # override per env (kustomize images:)
          env:
            - name: REQUIRE_AUTH
              value: "true"
            # Tenant creation via PR (POST /tenant -> gitlib). Token is a
            # write:repository PAT (MVP: maintainer; hardening: a bot) — out-of-band
            # Secret `openwoo-provisioner-git` (see deploy/secret.example.yaml).
            - name: FORGEJO_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openwoo-provisioner-git
                  key: token
            - name: FORGEJO_API_URL
              value: "https://codeberg.org/api/v1"
            - name: TENANTS_REPO
              value: "conduction/Nextcloud-base"
            - name: TENANTS_BASE
              value: "main"
            # Platform-assistent (change add-platform-assistant, v1 strikt
            # lezend). Model-auth via het assistent-secret; ontbreekt dat, dan
            # draait de rest van de webgui gewoon en geeft /assistant een
            # nette fout (503) — daarom optional: true.
            - name: ANTHROPIC_API_KEY
              valueFrom:
                secretKeyRef:
                  name: openwoo-assistant
                  key: api-key
                  optional: true
            # Testfase-alternatief (vastgelegde afwijking 2026-07-10):
            # persoonlijke subscription-token (`claude setup-token`). Zet
            # PRECIES ÉÉN van beide keys in het secret — de API-key wint
            # als beide gezet zijn.
            - name: CLAUDE_CODE_OAUTH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openwoo-assistant
                  key: oauth-token
                  optional: true
            # Leestoken voor private componenten in de handboek-importlijst.
            # docs_mcp zet dit in een 0600 credential-file in de cache — nooit
            # in een clone-URL of git-config. Publieke componenten werken zonder.
            - name: DOCS_READ_TOKEN
              valueFrom:
                secretKeyRef:
                  name: openwoo-assistant
                  key: docs-read-token
                  optional: true
            - name: HUB_DIR
              value: "/opt/hub"
            - name: DOCS_MCP_CACHE
              value: "/var/cache/docs-mcp"
            # Vraaglengte-cap (default 2000 bleek te krap in gebruik,
            # 2026-07-14). Begrensd houden: langere vraag = meer tokens/kosten.
            - name: ASSISTANT_MAX_QUESTION_CHARS
              value: "8000"
            # Live metrics voor de assistent (add-assistant-live-status
            # fase 2): tool metrics_query, vaste query-catalogus tegen de
            # in-cluster Prometheus-Service (zelfde waarde als de code-
            # default; hier expliciet zodat de route zichtbaar en per env
            # overschrijfbaar is). LET OP: komt de egress-policy terug
            # (networkpolicy-egress.yaml), dan moet 9090/TCP naar de
            # monitoring-namespace er expliciet in.
            - name: PROMETHEUS_URL
              value: "http://mon-kube-prometheus-stack-prometheus.monitoring.svc:9090"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 50m
              memory: 256Mi
            limits:
              cpu: "1"
              # 1Gi (was 512Mi): de assistent spawnt per sessie de gebundelde
              # claude-CLI als subprocess; rate limit + turn-cap houden de
              # gelijktijdigheid laag, maar één sessie erbij past niet in 512Mi.
              memory: 1Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
            # Shallow clones van de handboek-componenten (docs_mcp), vluchtig
            # per pod; max-age zorgt voor verversing.
            - name: docs-cache
              mountPath: /var/cache/docs-mcp
            # De gebundelde claude-CLI schrijft sessie-state onder $HOME;
            # readOnlyRootFilesystem maakt het image-home onbeschrijfbaar.
            - name: home
              mountPath: /home/appuser
        # The auth front: the SOLE network listener. Validates the operator
        # against Keycloak (which brokers Google) and forwards the identity as
        # X-Forwarded-Email to the app on localhost.
        - name: oauth2-proxy
          image: quay.io/oauth2-proxy/oauth2-proxy:v7.7.1
          args: ["--config=/etc/oauth2-proxy/oauth2-proxy.cfg"]
          env:
            - name: OAUTH2_PROXY_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: openwoo-provisioner-oauth
                  key: client-secret
            - name: OAUTH2_PROXY_COOKIE_SECRET
              valueFrom:
                secretKeyRef:
                  name: openwoo-provisioner-oauth
                  key: cookie-secret
          ports:
            - name: http
              containerPort: 4180
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            capabilities:
              drop: ["ALL"]
          resources:
            requests:
              cpu: 25m
              memory: 64Mi
            limits:
              cpu: 250m
              memory: 128Mi
          livenessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /ping
              port: 4180
            initialDelaySeconds: 5
            periodSeconds: 10
          volumeMounts:
            - name: oauth2-cfg
              mountPath: /etc/oauth2-proxy
              readOnly: true
      volumes:
        - name: tmp
          emptyDir: {}
        - name: docs-cache
          emptyDir:
            sizeLimit: 1Gi
        - name: home
          emptyDir:
            sizeLimit: 512Mi
        - name: oauth2-cfg
          configMap:
            name: oauth2-proxy-cfg
