apiVersion: networking.k8s.io/v1
kind: NetworkPolicy
metadata:
  name: openwoo-provisioner
  namespace: openwoo-platform
spec:
  podSelector:
    matchLabels:
      app.kubernetes.io/name: openwoo-provisioner
  # Ingress-only. The security control is the SOLE-INGRESS restriction below
  # (only ingress-nginx may reach the pod, only on :4180) which — together with
  # the app's 127.0.0.1 bind — is the trust anchor for X-Forwarded-Email.
  #
  # Egress is intentionally NOT restricted: an egress policy here (even allowing
  # 53 to all destinations) broke DNS resolution under this cluster's Calico CNI
  # (oauth2-proxy → "lookup iam.commonground.nu: i/o timeout"), and the app
  # legitimately needs outbound to Keycloak + arbitrary tenant public URLs anyway.
  # This matches the working tenant-namespace baseline (no egress policy).
  policyTypes:
    - Ingress
  ingress:
    # Only the ingress-nginx controller may reach the pod, and only on the
    # oauth2-proxy port. Together with the app's 127.0.0.1 bind this enforces
    # "oauth2-proxy is the sole ingress" — the trust anchor for X-Forwarded-Email.
    - from:
        - namespaceSelector:
            matchLabels:
              kubernetes.io/metadata.name: ingress-nginx
      ports:
        - protocol: TCP
          port: 4180
