<!DOCTYPE html>
<!-- SPDX-License-Identifier: EUPL-1.2 -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenWoo — create tenant</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: .6rem 0 .15rem; font-size: .9rem; }
    input[type=text], select { width: 100%; padding: .45rem; box-sizing: border-box; }
    .row { margin: .4rem 0; }
    .hint { color: #666; font-size: .8rem; }
    button { margin-top: 1rem; padding: .6rem 1.2rem; font-size: 1rem; }
    fieldset { border: 1px solid #ccc; margin: 1rem 0; }
    #result { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; }
    #result.ok { background: #e7f6e7; border: 1px solid #8c8; }
    #result.err { background: #fbeaea; border: 1px solid #d99; }
    #result a { font-weight: 600; }
  </style>
</head>
<body>
  <p style="font-size:.85rem;margin:.5rem 0 1rem"><a href="/">← Home</a> &middot; <a href="/oauth2/sign_out">Log out</a></p>
  <h1>Create a WOO tenant</h1>
  <p class="hint">Writes <code>tenant-&lt;name&gt;.yaml</code> and opens a
     <strong>pull request</strong> on Nextcloud-base. A reviewer merges it; Argo
     then rolls out the tenant. Secrets are generated in-cluster — never here.</p>

  <form id="f">
    <fieldset>
      <legend>Tenant</legend>
      <label>Name <span class="hint">(&lt;org&gt;-&lt;accept|test|demo|prod&gt;, e.g. almere-accept)</span></label>
      <input type="text" name="name" placeholder="almere-accept" required>
      <label>Environment</label>
      <select name="environment">
        <option value="accept">accept</option>
        <option value="prod">prod</option>
      </select>
      <label>Database</label>
      <select name="dbType">
        <option value="postgres">postgres</option>
        <option value="mariadb">mariadb</option>
        <option value="external">external</option>
      </select>
      <label>Wave <span class="hint">(0 = canary, 1+ = standard)</span></label>
      <input type="text" name="wave" value="1">
    </fieldset>
    <fieldset>
      <legend>Apps</legend>
      <div class="row"><label><input type="checkbox" name="apps" value="opencatalogi" checked> opencatalogi</label></div>
      <div class="row"><label><input type="checkbox" name="apps" value="openconnector" checked> openconnector</label></div>
      <div class="row"><label><input type="checkbox" name="apps" value="openregister" checked> openregister</label></div>
    </fieldset>
    <fieldset>
      <legend>Frontend (optional)</legend>
      <label>Custom host <span class="hint">(blank = derived &lt;org&gt;.&lt;env&gt;.openwoo.app)</span></label>
      <input type="text" name="frontend_host" placeholder="open.almere.nl">
      <label>Organisation name <span class="hint">(branding — GATSBY_ORGANISATION_NAME)</span></label>
      <input type="text" name="frontend_org" placeholder="Gemeente Almere">
    </fieldset>
    <button type="submit">Open pull request</button>
  </form>

  <div id="result"></div>

  <script>
    const f = document.getElementById('f'), result = document.getElementById('result');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.style.display = 'block';
      result.className = '';
      result.textContent = 'opening pull request…';
      let resp, data;
      try {
        resp = await fetch('/tenant', { method: 'POST', body: new FormData(f) });
        data = await resp.json();
      } catch (err) {
        result.className = 'err';
        result.textContent = 'network error: ' + err;
        return;
      }
      if (resp.status === 201 && data.pr_url) {
        result.className = 'ok';
        result.innerHTML = '✅ Tenant requested — PR #' + (data.pr_number ?? '') +
          ' opened → <a href="' + data.pr_url + '" target="_blank" rel="noopener">review &amp; merge</a>';
      } else {
        result.className = 'err';
        const errs = (data && data.errors) ? data.errors : ['unexpected error (HTTP ' + resp.status + ')'];
        result.innerHTML = '⚠️ ' + errs.map(x => x.replace(/</g, '&lt;')).join('<br>');
      }
    });
  </script>
</body>
</html>
