<!DOCTYPE html>
<!-- SPDX-License-Identifier: EUPL-1.2 -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenWoo — batch create tenants</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: .6rem 0 .15rem; font-size: .9rem; }
    textarea, select { width: 100%; padding: .45rem; box-sizing: border-box; font-family: inherit; }
    textarea { min-height: 8rem; font-family: ui-monospace, monospace; }
    .hint { color: #666; font-size: .8rem; }
    button { margin-top: 1rem; padding: .6rem 1.2rem; font-size: 1rem; }
    fieldset { border: 1px solid #ccc; margin: 1rem 0; }
    .preview { background: #f4f6f8; border: 1px solid #e0e4e8; border-radius: 6px; padding: .6rem .8rem; margin-top: .6rem; font-size: .85rem; }
    #result { margin-top: 1rem; padding: 1rem; border-radius: 6px; display: none; }
    #result.ok { background: #e7f6e7; border: 1px solid #8c8; }
    #result.err { background: #fbeaea; border: 1px solid #d99; }
    #result.pending { background: #fff7e6; border: 1px solid #e3c266; }
  </style>
</head>
<body>
  <p style="font-size:.85rem;margin:.5rem 0 1rem"><a href="/">← Home</a> &middot; <a href="/logout">Uitloggen</a></p>
  <h1>Meerdere omgevingen aanmaken</h1>
  <p class="hint">Eén organisatie per regel. Allemaal dezelfde omgeving, de 3 apps, veilige
     wachtwoorden en `Gemeente &lt;organisatie&gt;` als naam. Levert <strong>één</strong>
     aanvraag op met alle omgevingen.</p>

  <form id="f">
    <fieldset>
      <legend>Organisaties</legend>
      <label>Organisaties <span class="hint">(één per regel, korte namen)</span></label>
      <textarea name="orgs" id="orgs" placeholder="almere&#10;baarn&#10;soest" required></textarea>
      <label>Acceptatie of productie</label>
      <select name="environment" id="env">
        <option value="accept">acceptatie</option>
        <option value="prod">productie</option>
      </select>
      <div class="preview" id="preview">…</div>
    </fieldset>
    <button type="submit">Aanvraag indienen</button>
  </form>

  <div id="result"></div>

  <script>
    const f = document.getElementById('f'), result = document.getElementById('result');
    const orgs = document.getElementById('orgs'), env = document.getElementById('env'), preview = document.getElementById('preview');
    function refresh() {
      const lines = orgs.value.split('\n').map(s => s.trim().toLowerCase()).filter(Boolean);
      const e = env.value;
      if (!lines.length) { preview.textContent = '…'; return; }
      preview.innerHTML = `${lines.length} omgeving(en): ` + lines.map(o => `<code>${o}-${e}</code>`).join(' ');
    }
    orgs.addEventListener('input', refresh); env.addEventListener('change', refresh); refresh();

    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      result.style.display = 'block'; result.className = 'pending'; result.textContent = 'aanvraag indienen…';
      let resp, data;
      try { resp = await fetch('/tenant/batch', { method: 'POST', body: new FormData(f) }); data = await resp.json(); }
      catch (err) { result.className = 'err'; result.textContent = 'netwerkfout: ' + err; return; }
      if (resp.status === 201 && data.pr_url) {
        result.className = 'ok';
        result.innerHTML = `✅ ${data.count} omgevingen — aanvraag #${data.pr_number} ingediend → ` +
          `<a href="${data.pr_url}" target="_blank" rel="noopener">bekijken &amp; goedkeuren</a>. ` +
          `Volg de uitrol op <a href="/">Home</a>.`;
      } else {
        result.className = 'err';
        const errs = (data && data.errors) ? data.errors : ['unexpected error (HTTP ' + resp.status + ')'];
        result.innerHTML = '⚠️ ' + errs.map(x => x.replace(/</g, '&lt;')).join('<br>');
      }
    });
  </script>
</body>
</html>
