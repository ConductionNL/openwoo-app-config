<!DOCTYPE html>
<!-- SPDX-License-Identifier: EUPL-1.2 -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenWoo tenant provisioning</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: .6rem 0 .15rem; font-size: .9rem; }
    input[type=text], input[type=password] { width: 100%; padding: .45rem; box-sizing: border-box; }
    .row { margin: .4rem 0; }
    .hint { color: #666; font-size: .8rem; }
    button { margin-top: 1rem; padding: .6rem 1.2rem; font-size: 1rem; }
    pre { background: #111; color: #ddd; padding: 1rem; overflow:auto; white-space: pre-wrap; min-height: 6rem; }
    fieldset { border: 1px solid #ccc; margin: 1rem 0; }
  </style>
</head>
<body>
  <p style="font-size:.85rem;margin:.5rem 0 1rem"><a href="/">← Home</a> &middot; <a href="/logout">Uitloggen</a></p>
  <h1>Omgeving inrichten</h1>
  <p class="hint">Laadt de WOO-basisconfiguratie (register, schema's, bronnen) in een bestaande
     omgeving via de <strong>publieke URL</strong>. Inloggegevens worden alleen voor deze run
     gebruikt en nooit bewaard.</p>

  <form id="f">
    <fieldset>
      <legend>Omgeving</legend>
      <label>Basis-URL van de omgeving</label>
      <input type="text" name="base" placeholder="https://&lt;organisatie&gt;.accept.commonground.nu" required>
      <label>Beheerder</label>
      <input type="text" name="user" value="admin">
      <label>App-wachtwoord</label>
      <input type="password" name="password" autocomplete="off">
    </fieldset>
    <fieldset>
      <legend>Bronkoppeling (per omgeving)</legend>
      <label>Bron-URL <span class="hint">(leeg = configuratie-standaard behouden)</span></label>
      <input type="text" name="source_url">
      <label>API-Interface-ID <span class="hint">(leeg = configuratie-standaard behouden)</span></label>
      <input type="text" name="api_interface_id">
      <label>Bron-API-sleutel <span class="hint">(leeg = test-sleutel)</span></label>
      <input type="password" name="apikey" autocomplete="off">
    </fieldset>
    <fieldset>
      <legend>Opties</legend>
      <div class="row"><label><input type="checkbox" name="force_import"> Forceer her-import (configuratie gewijzigd)</label></div>
      <div class="row"><label><input type="checkbox" name="run_syncs"> Synchronisaties draaien na inrichten (live ophalen)</label></div>
      <div class="row"><label><input type="checkbox" name="dry_run"> &nbsp;&nbsp;└ alleen test (dry-run)</label></div>
    </fieldset>
    <button type="submit">Inrichten starten</button>
  </form>

  <h2 style="font-size:1rem">Uitvoer</h2>
  <pre id="out">(nog niets)</pre>

  <script>
    const f = document.getElementById('f'), out = document.getElementById('out');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      out.textContent = 'running…\n';
      const resp = await fetch('/provision', { method: 'POST', body: new FormData(f) });
      const reader = resp.body.getReader(), dec = new TextDecoder();
      out.textContent = '';
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        out.textContent += dec.decode(value, { stream: true });
        out.scrollTop = out.scrollHeight;
      }
    });
  </script>
</body>
</html>
