<!DOCTYPE html>
<!-- SPDX-License-Identifier: EUPL-1.2 -->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>OpenWoo tenant provisioning</title>
  <style>
    body { font-family: system-ui, sans-serif; max-width: 760px; margin: 2rem auto; padding: 0 1rem; }
    h1 { font-size: 1.3rem; }
    label { display: block; margin: .6rem 0 .15rem; font-size: .9rem; }
    input[type=text], input[type=password] { width: 100%; padding: .45rem; box-sizing: border-box; }
    .row { margin: .4rem 0; }
    .hint { color: #666; font-size: .8rem; }
    button { margin-top: 1rem; padding: .6rem 1.2rem; font-size: 1rem; }
    pre { background: #111; color: #ddd; padding: 1rem; overflow:auto; white-space: pre-wrap; min-height: 6rem; }
    fieldset { border: 1px solid #ccc; margin: 1rem 0; }
  </style>
</head>
<body>
  <p style="font-size:.85rem;margin:.5rem 0 1rem"><a href="/">← Home</a> &middot; <a href="/logout">Log out</a></p>
  <h1>OpenWoo tenant provisioning</h1>
  <p class="hint">Runs <code>provision.py all</code> against a tenant's <strong>public URL</strong>.
     Credentials are used for this run only and are never stored.</p>

  <form id="f">
    <fieldset>
      <legend>Tenant</legend>
      <label>Tenant base URL</label>
      <input type="text" name="base" placeholder="https://&lt;org&gt;.accept.commonground.nu" required>
      <label>Admin user</label>
      <input type="text" name="user" value="admin">
      <label>App password</label>
      <input type="password" name="password" autocomplete="off">
    </fieldset>
    <fieldset>
      <legend>Source connection (per tenant)</legend>
      <label>Source URL <span class="hint">(blank = keep config default)</span></label>
      <input type="text" name="source_url">
      <label>API-Interface-ID <span class="hint">(blank = keep config default)</span></label>
      <input type="text" name="api_interface_id">
      <label>Source API key <span class="hint">(blank = dummy test key)</span></label>
      <input type="password" name="apikey" autocomplete="off">
    </fieldset>
    <fieldset>
      <legend>Options</legend>
      <div class="row"><label><input type="checkbox" name="force_import"> Force re-import (config content changed)</label></div>
      <div class="row"><label><input type="checkbox" name="run_syncs"> Run synchronizations after provisioning (live fetch)</label></div>
      <div class="row"><label><input type="checkbox" name="dry_run"> &nbsp;&nbsp;└ dry-run only (/test)</label></div>
    </fieldset>
    <button type="submit">Run provisioning</button>
  </form>

  <h2 style="font-size:1rem">Output</h2>
  <pre id="out">(idle)</pre>

  <script>
    const f = document.getElementById('f'), out = document.getElementById('out');
    f.addEventListener('submit', async (e) => {
      e.preventDefault();
      out.textContent = 'running…\n';
      const resp = await fetch('/provision', { method: 'POST', body: new FormData(f) });
      const reader = resp.body.getReader(), dec = new TextDecoder();
      out.textContent = '';
      for (;;) {
        const { value, done } = await reader.read();
        if (done) break;
        out.textContent += dec.decode(value, { stream: true });
        out.scrollTop = out.scrollHeight;
      }
    });
  </script>
</body>
</html>
