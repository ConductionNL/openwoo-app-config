# Gate-mode hooks (nooit auto-fix). Activeren:
#   pre-commit install --hook-type pre-push
repos:
  - repo: https://codeberg.org/Conduction/techbook
    rev: edf269eeea4fd28f150791a00d6600d645262a91
    hooks:
      - id: docs-contract
      - id: docs-claims

  - repo: local
    hooks:
      - id: verify
        name: verify (lint + unit tests)
        entry: scripts/verify.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]

  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.18.4
    hooks:
      - id: gitleaks

  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: detect-private-key
