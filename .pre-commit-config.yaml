# Gate-mode hooks (nooit auto-fix). Activeren:
#   pre-commit install --hook-type pre-push
repos:
  - repo: https://codeberg.org/Conduction/techbook
    rev: 834f9467074caaedc39c0c61ab4f09773a6790d2
    hooks:
      - id: docs-contract

  - repo: local
    hooks:
      - id: verify
        name: verify (lint + unit tests)
        entry: scripts/verify.sh
        language: system
        pass_filenames: false
        always_run: true
        stages: [pre-push]
